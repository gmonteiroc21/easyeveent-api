# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/opt/homebrew/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>


development:
  <<: *default
  database: easyeveent_api_development
  username: postgres
  password: postgres
  host: localhost
  port: 5432

test:
  <<: *default
  database: easyeveent_api_test
  username: postgres
  password: postgres
  host: localhost
  port: 5432

production:
  primary: &primary_production
    <<: *default
    database: easyeveent_api_production
    username: easyeveent_api
    password: <%= ENV["EASYEVEENT_API_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: easyeveent_api_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: easyeveent_api_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: easyeveent_api_production_cable
    migrations_paths: db/cable_migrate
